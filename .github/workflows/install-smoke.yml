name: install-smoke
# Cross-OS install smoke test — complements python-ci.yml. Also runs
# weekly so wheel-build / dependency regressions surface within the
# week even in the absence of repo activity.
# Copyright (c) 2026 B-Tree Labs. SPDX-License-Identifier: Apache-2.0

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Mondays 08:00 UTC

jobs:
  smoke:
    name: install + import on ${{ matrix.os }} / py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build and install from source
        run: |
          python -m pip install --upgrade pip build
          python -m build
          python -m pip install dist/*.whl

      - name: Smoke-test the installed package
        run: |
          python -c "import dendra; print('version:', dendra.__version__ if hasattr(dendra, '__version__') else 'unknown')"
          python -c "from dendra import ml_switch, Phase, SwitchConfig, LearnedSwitch; print('client SDK imports ok')"
          dendra --help

      - name: Run example gallery against the installed wheel
        run: |
          # Examples live in the repo but import from the installed
          # package, so running them here verifies the public API
          # surface that consumers actually see. Each script exits 0
          # on success.
          for example in examples/01_hello_world.py \
                         examples/02_outcome_log.py \
                         examples/03_safety_critical.py \
                         examples/04_llm_shadow.py \
                         examples/05_output_safety.py; do
            echo "--- $example ---"
            python "$example"
          done
