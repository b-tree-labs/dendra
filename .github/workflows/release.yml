#
# Triggered by a tag push. Requires PyPI trusted-publisher configured for
# the `dendra` project at https://pypi.org/manage/project/dendra/settings/publishing/
# with workflow `release.yml`, environment `pypi`.
name: release

on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: b-tree-labs/.github/.github/workflows/python-release.yml@v1
    with:
      package-name: dendra
      pypi-project: dendra
      pypi-environment: pypi
    secrets: inherit
