#
 # Quarantined to schedule-only — the shared security-scan reusable in
# b-tree-labs/.github@v1 has three independent upstream bugs that make
# every run fail without signal:
#   1. grype: invalid SARIF / stale DB pinning produces "Failed minimum
#      severity level" against transitive deps we can't pin away.
#   2. gitleaks: gitleaks-action@v2 now requires a paid GitLeaks org
#      license; runs exit non-zero without one.
#   3. REUSE: fsfe/reuse-action@v4 doesn't understand our split-license
#      layout (LICENSE.md as the map-of-record + per-file SPDX); flags
#      everything it doesn't have a literal LICENSE-* file for.
#
# Until those are fixed upstream, push:main and pull_request triggers are
# disabled — they produced an email storm on every merge without surfacing
# real regressions. The weekly cron remains so the dashboard still gets a
# scan; failures there are reviewed by hand. Tracked in scripts/ship-check.sh
# WAIVERS list. Re-enable push:main once the reusable is fixed.
name: security

on:
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC
  workflow_dispatch:  # manual trigger for ad-hoc scans

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: b-tree-labs/.github/.github/workflows/security-scan.yml@v1
    with:
      package-name: dendra
      fail-on-severity: high
    secrets: inherit
    permissions:
      contents: read
      security-events: write
