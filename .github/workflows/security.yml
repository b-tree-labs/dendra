#
# Scheduled-only for now — the shared security-scan reusable in
# axiom-labs-os/.github@v1 has three independent upstream bugs
# (stale grype DB pinning, gitleaks org-license requirement, REUSE
# convention mismatch with our split-license layout). Enabling the
# workflow on pull_request produces noise without signal until
# those are fixed. See the follow-up tracking issue for details.
#
# Runs weekly on Mondays 07:00 UTC (independent of PR cadence) so
# the weekly dashboard still receives vulnerability scans, and
# against main on push so regressions in the default branch are
# surfaced without waiting a week.
name: security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # Mondays 07:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: axiom-labs-os/.github/.github/workflows/security-scan.yml@v1
    with:
      package-name: dendra
      fail-on-severity: high
    secrets: inherit
    permissions:
      contents: read
      security-events: write
