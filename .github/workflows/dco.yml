name: dco
# Enforces DCO sign-off on every commit in a PR (see CONTRIBUTING.md).
# Bots are exempted by convention. Copyright (c) 2026 B-Tree Ventures, LLC.
# SPDX-License-Identifier: Apache-2.0

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: DCO sign-off on every commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit is Signed-off-by
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          # Bot users are exempt by convention.
          case "$PR_AUTHOR" in
            dependabot\[bot\]|github-actions\[bot\]|renovate\[bot\])
              echo "PR author '$PR_AUTHOR' is exempt from DCO enforcement."
              exit 0
              ;;
          esac

          missing=0
          while read -r sha; do
            author_email=$(git log -1 --format='%ae' "$sha")
            signoff=$(git log -1 --format='%B' "$sha" \
              | grep -E '^Signed-off-by: .+ <.+@.+>' || true)

            if [ -z "$signoff" ]; then
              echo "::error::commit $sha is missing a Signed-off-by trailer"
              missing=$((missing + 1))
              continue
            fi

            # Require the sign-off email to match the commit author email.
            # This keeps contributors from signing off on someone else's work.
            if ! echo "$signoff" | grep -qF "<$author_email>"; then
              echo "::error::commit $sha sign-off email does not match commit author ($author_email)"
              echo "::error::got: $signoff"
              missing=$((missing + 1))
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")

          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Found $missing commit(s) missing or mis-attributed sign-off."
            echo "Fix with: git rebase -i --signoff $BASE_SHA"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commits carry a matching Signed-off-by trailer."
