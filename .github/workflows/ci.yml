# Replaces .github/workflows/test.yml once b-tree-labs/.github is pushed
# and tagged at v1.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: b-tree-labs/.github/.github/workflows/python-ci.yml@v1
    with:
      package-name: postrule
      python-versions: '["3.10","3.11","3.12","3.13"]'
      extras: 'dev,train,viz'
      run-pre-commit: true
      provenance-forbidden-patterns: 'utexas|UT Austin|bbooth@'
      provenance-paths: 'src/ tests/ docs/ examples/ landing/ README.md CHANGELOG.md SECURITY.md CONTRIBUTING.md CODEOWNERS LICENSE.md LICENSING.md LICENSE-APACHE LICENSE-BSL NOTICE TRADEMARKS.md SUPPORT.md pyproject.toml'
    secrets: inherit
