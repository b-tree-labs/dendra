# Nightly aggregator job — turns D1 events into tuned-defaults.json.
# Two passes per night: staging first, then production after a delay.
# Failure of staging skips production (don't republish prod from a
# busted aggregator).
#
# v1.0 ships a TRIVIAL aggregator that republishes baked-in defaults
# with cohort_size + generated_at refreshed. Real signal extraction
# is Phase B per docs/working/environments-cicd-observability-2026-04-30.md.

name: Aggregator (nightly)

on:
  schedule:
    # 03:00 UTC daily — well past peak traffic in all timezones.
    - cron: "0 3 * * *"
  workflow_dispatch:  # manual run

permissions:
  contents: write  # commits the regenerated landing/insights/tuned-defaults.json

concurrency:
  group: aggregator-nightly
  cancel-in-progress: false  # never cancel a partial aggregation mid-run

jobs:
  staging:
    name: Aggregate staging cohort
    runs-on: ubuntu-latest
    outputs:
      cohort_size: ${{ steps.run.outputs.cohort_size }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history to compute the right "next version" number.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wrangler
        run: npm install -g wrangler@4
      - name: Run aggregator (staging)
        id: run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python cloud/aggregator/run.py \
            --database dendra-events-staging \
            --output landing/insights/tuned-defaults.staging.json
          # Surface the cohort size so the next job can decide
          # whether the aggregator output looks sane before promoting.
          cohort_size=$(jq -r '.cohort_size' landing/insights/tuned-defaults.staging.json)
          echo "cohort_size=$cohort_size" >> "$GITHUB_OUTPUT"
      - name: Upload staging artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: tuned-defaults-staging
          path: landing/insights/tuned-defaults.staging.json
          retention-days: 14

  production:
    name: Aggregate production cohort + commit
    needs: staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install wrangler
        run: npm install -g wrangler@4
      - name: Run aggregator (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python cloud/aggregator/run.py \
            --database dendra-events \
            --env production \
            --output landing/insights/tuned-defaults.json
      - name: Commit if changed
        run: |
          git config user.name "dendra-aggregator-bot"
          git config user.email "noreply@dendra.run"
          if git diff --quiet landing/insights/tuned-defaults.json; then
            echo "No changes to landing/insights/tuned-defaults.json"
            exit 0
          fi
          git add landing/insights/tuned-defaults.json
          git commit -m "chore(aggregator): nightly cohort refresh

          $(cd $GITHUB_WORKSPACE && jq -r '. as $d | "version: \($d.version)\ncohort_size: \($d.cohort_size)\nevents_total: \($d._meta.events_total)\ngenerated_at: \($d.generated_at)"' landing/insights/tuned-defaults.json)

          [aggregator-bot]"
          git push
