# Dendra analyzer — GitHub Action template
#
# Drop this file into `.github/workflows/dendra-analyze.yml` in your
# repository. On every pull request it scans the diff for new or
# changed classification sites, posts a comment with the Dendra-fit
# ranking, and uploads the full JSON artifact for longer-term
# tracking.
#
# Requirements: Python 3.10+ runner. No secrets required for static
# analysis; no data leaves your runner.

name: dendra-analyze

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for comment posting

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dendra
        run: pip install "dendra>=1.0.0"

      - name: Run analyzer (full repo)
        run: |
          dendra analyze . --format markdown --project-savings \
              > dendra-report.md
          dendra analyze . --format json \
              > dendra-report.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dendra-analyzer-report
          path: |
            dendra-report.md
            dendra-report.json

      - name: Post comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('dendra-report.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]'
                && c.body.startsWith('# Dendra analyzer report')
            );
            const commentBody =
              body
              + '\n\n---\n_Auto-generated by `dendra analyze`. '
              + '[Dendra docs](https://dendra.run/docs)._';
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody,
              });
            }
