#
# Cloudflare Worker config — Dendra hosted API.
#
# Two environments: staging (default) + production.
# Deploy with:
#   wrangler deploy                          # → staging (default env)
#   wrangler deploy --env production         # → production
#
# Required secrets (set with `wrangler secret put <NAME>`):
#   API_KEY_PEPPER          — 32-byte random hex; HMAC pepper for key hashing
#   DASHBOARD_SERVICE_TOKEN — bearer token the dashboard uses for /admin/*
#   STRIPE_SECRET_KEY       — sk_live_… for webhook signature verification
#   STRIPE_WEBHOOK_SECRET   — whsec_… signing secret for /webhook/stripe
#   LICENSE_SIGNING_PRIVATE_KEY — Ed25519 hex for /admin/licenses/sign
#
# Observability: Workers Observability is enabled below; logs from
# console.{log,warn,error} land in the Cloudflare dashboard with 3-day
# retention. Sentry/Logpush are deferred until post-launch.
#
# Migrations live with the collector (cloud/collector/migrations/) since
# both Workers share the same D1 database (users + api_keys + events).

name = "dendra-api-staging"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# Persist console.* output to the Cloudflare dashboard (3-day retention,
# searchable, free). Without this, logs are visible only via `wrangler
# tail` while a session is running.
[observability]
enabled = true
head_sampling_rate = 1.0

# Custom domain for staging.
[[routes]]
pattern = "staging-api.dendra.run"
custom_domain = true

# Shared D1 database with the collector.
[[d1_databases]]
binding = "DB"
database_name = "dendra-events-staging"
database_id = "77ac4e6c-a09f-486a-9f40-bed39d209e2c"

# Cohort-wisdom JSON written nightly by cloud/aggregator/run.py and
# served from /insights/tuned-defaults.json. Replace the placeholder id
# after running:
#   wrangler kv namespace create dendra-insights-staging
# See docs/working/aggregator-kv-cutover-2026-05-07.md.
[[kv_namespaces]]
binding = "KV_INSIGHTS"
id = "e3b36f13737b4cf09850182549493779"

# Per-IP rate limits on the anonymous device-flow endpoints. Workers
# Rate Limiting is in-Worker (no extra plan required); namespace_id is
# a stable arbitrary integer per limiter, scoped to this Worker.
[[ratelimits]]
name = "DEVICE_CODE_LIMIT"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "DEVICE_TOKEN_LIMIT"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

[vars]
ENVIRONMENT = "staging"

# ---------------------------------------------------------------------------
# Production environment
# ---------------------------------------------------------------------------

[env.production]
name = "dendra-api"

[[env.production.routes]]
pattern = "api.dendra.run"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "dendra-events"
database_id = "d8f78857-de29-4ee2-a449-b78c95c6ad67"

# Production cohort-wisdom KV. Replace the placeholder id after running:
#   wrangler kv namespace create dendra-insights-production
# See docs/working/aggregator-kv-cutover-2026-05-07.md.
[[env.production.kv_namespaces]]
binding = "KV_INSIGHTS"
id = "6af5e74e6de9496392621ad8030eb69f"

[[env.production.ratelimits]]
name = "DEVICE_CODE_LIMIT"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[[env.production.ratelimits]]
name = "DEVICE_TOKEN_LIMIT"
namespace_id = "1002"
simple = { limit = 30, period = 60 }

[env.production.observability]
enabled = true
head_sampling_rate = 1.0

[env.production.vars]
ENVIRONMENT = "production"
