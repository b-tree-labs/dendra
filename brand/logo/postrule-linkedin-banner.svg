<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkedIn company-page banner — 1128×191. Very narrow vertical
  space; composition is horizontal band only. Mark on left,
  wordmark center, tagline trailing.
-->
<svg viewBox="0 0 1128 191" xmlns="http://www.w3.org/2000/svg">
  <rect width="1128" height="191" fill="#f8f6f1"/>

  <!-- Mark, scaled to fit the banner height -->
  <g transform="translate(56, 32) scale(0.248)">
    <line x1="72" y1="400" x2="222" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <line x1="290" y1="400" x2="440" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <polyline points="172,400 172,200 340,200 340,400"
              fill="none"
              stroke="#1a1a1f" stroke-width="34"
              stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="256" y1="448" x2="256" y2="96"
          stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
    <circle cx="256" cy="200" r="28"
            fill="none" stroke="#1a1a1f" stroke-width="12"/>
  </g>

  <text x="216" y="112"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="500" font-size="52" letter-spacing="9.4"
        fill="#1a1a1f">POSTRULE</text>

  <text x="480" y="112"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="400" font-size="21"
        fill="#6a6a72">Self-taught classifiers. The graduated-autonomy primitive for production classification.</text>
</svg>
