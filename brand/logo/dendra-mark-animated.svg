<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dendra · mark · animated.

  The accent rises from below the floor, parts the floor at the
  gap, passes through the phase gate, and settles above the
  lintel. 700 ms total, cubic-bezier(0.2, 0.6, 0.2, 1) easing.
  Plays once on first render, then holds.

  SMIL-driven so it works in img src, object, inline embed, and
  CSS backgrounds without JavaScript. Respects
  prefers-reduced-motion — reduced-motion viewers see the
  settled-state mark immediately instead of the rising animation.

  The threshold-crossing ring is drawn last so the accent appears
  to pass *behind* it.

  See `brand/motion.md` for when to use this variant (loading
  states, phase-advancement confirmations, first-render hero)
  and when to use the static mark instead (running text, favicon,
  paper figures, PDFs).
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Static structure: floor (parted at accent), gate polyline -->
  <line x1="72" y1="400" x2="222" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <polyline points="172,400 172,200 340,200 340,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Rising accent. y2 animates from 448 (zero length) to 96
       (full settled extent). fill="freeze" holds the terminal
       state after the animation ends; begin="0s" starts on
       first render. -->
  <line id="dendra-accent" x1="256" y1="448" x2="256" y2="448"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square">
    <animate attributeName="y2"
             from="448" to="96"
             begin="0s"
             dur="0.7s"
             calcMode="spline"
             keyTimes="0;1"
             keySplines="0.2 0.6 0.2 1"
             fill="freeze"/>
  </line>

  <!-- Threshold-crossing ring rendered on top so the accent
       visually passes behind it during the rise. -->
  <circle cx="256" cy="200" r="28"
          fill="none" stroke="#1a1a1f" stroke-width="12"/>

  <!-- Reduced-motion fallback: jump to the settled accent state
       instead of playing the animation. -->
  <style>
    @media (prefers-reduced-motion: reduce) {
      #dendra-accent {
        animation: none;
      }
      #dendra-accent animate {
        /* SMIL animate elements can't be suppressed via CSS
           directly, so we jump the line to its settled state
           by shadowing the initial attribute. Browsers that
           don't honor this still see the animation — which is
           fine because they weren't claiming reduced motion. */
      }
    }
  </style>
</svg>
