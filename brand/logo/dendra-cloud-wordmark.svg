<?xml version="1.0" encoding="UTF-8"?>
<!--
  DENDRA CLOUD horizontal lockup. Parent wordmark "DENDRA" at
  Space Grotesk Medium 108 px tracking 0.18em; sub-brand "CLOUD"
  at Space Grotesk Regular 88 px tracking 0.15em — subordinate
  weight and size preserve the visual hierarchy without changing
  family. 1400×300 canvas gives the longer lockup breathing room.
-->
<svg viewBox="0 0 1400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="300" fill="#f8f6f1"/>

  <g transform="translate(50, 50) scale(0.391)">
    <line x1="72" y1="400" x2="222" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <line x1="290" y1="400" x2="440" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <polyline points="172,400 172,200 340,200 340,400"
              fill="none"
              stroke="#1a1a1f" stroke-width="34"
              stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="256" y1="448" x2="256" y2="96"
          stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
    <circle cx="256" cy="200" r="28"
            fill="none" stroke="#1a1a1f" stroke-width="12"/>
  </g>

  <text x="300" y="185"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="500" font-size="108" letter-spacing="19.4"
        fill="#1a1a1f">DENDRA</text>

  <text x="850" y="185"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="400" font-size="88" letter-spacing="13.2"
        fill="#6a6a72">CLOUD</text>
</svg>
