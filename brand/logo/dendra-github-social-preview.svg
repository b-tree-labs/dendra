<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub repo social preview — 1280×640. The image GitHub renders
  when the repo is shared in chat, social, or other OG-aware
  contexts. Uploaded via Settings → Social preview on the repo.
-->
<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#f8f6f1"/>

  <!-- Mark — scale 0.88 positioned on left -->
  <g transform="translate(80, 120) scale(0.78)">
    <line x1="72" y1="400" x2="222" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <line x1="290" y1="400" x2="440" y2="400"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <polyline points="172,400 172,200 340,200 340,400"
              fill="none"
              stroke="#1a1a1f" stroke-width="34"
              stroke-linecap="square" stroke-linejoin="miter"/>
    <line x1="256" y1="448" x2="256" y2="96"
          stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
    <circle cx="256" cy="200" r="28"
            fill="none" stroke="#1a1a1f" stroke-width="12"/>
  </g>

  <!-- Wordmark -->
  <text x="560" y="260"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="500" font-size="104" letter-spacing="18.7"
        fill="#1a1a1f">DENDRA</text>

  <!-- Tagline -->
  <text x="560" y="340"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="400" font-size="32"
        fill="#6a6a72">The classification primitive every</text>
  <text x="560" y="385"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="400" font-size="32"
        fill="#6a6a72">production codebase is missing.</text>

  <!-- Install hint -->
  <text x="560" y="490"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-weight="400" font-size="26"
        fill="#1a1a1f">$ pip install dendra</text>

  <!-- URL strip -->
  <line x1="560" y1="550" x2="1200" y2="550"
        stroke="#d8d3c9" stroke-width="2"/>
  <text x="560" y="590"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-weight="400" font-size="22"
        fill="#6a6a72">github.com/b-tree-labs/dendra  ·  dendra.run</text>
</svg>
