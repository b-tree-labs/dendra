<?xml version="1.0" encoding="UTF-8"?>
<!--
  E Open Graph social card — 1200×630, the standard OG / Twitter
  large-image ratio. Light ground so the mark reads as the primary
  subject and the accent cell is the dominant warm pop.
-->
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f8f6f1"/>

  <!-- Mark — centered vertically in the left ~40%, scale 0.82 -->
  <g transform="translate(80, 110) scale(0.82)">
    <rect x="88" y="88" width="144" height="144" fill="#1a1a1f"/>
    <rect x="280" y="88" width="144" height="144" fill="#BF5700"/>
    <rect x="88" y="280" width="144" height="144" fill="#1a1a1f"/>
    <rect x="280" y="280" width="144" height="144" fill="#1a1a1f"/>
  </g>

  <!-- Wordmark -->
  <text x="560" y="250"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="500" font-size="88" letter-spacing="15.8"
        fill="#1a1a1f">POSTRULE</text>

  <!-- Tagline -->
  <text x="560" y="330"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="400" font-size="30"
        fill="#6a6a72">The classification primitive every</text>
  <text x="560" y="372"
        font-family="'Space Grotesk', 'Helvetica Neue', sans-serif"
        font-weight="400" font-size="30"
        fill="#6a6a72">production codebase is missing.</text>

  <!-- Install hint -->
  <text x="560" y="475"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-weight="400" font-size="24"
        letter-spacing="0.5"
        fill="#1a1a1f">$ pip install postrule</text>

  <!-- URL strip at bottom -->
  <line x1="560" y1="530" x2="1120" y2="530"
        stroke="#d8d3c9" stroke-width="2"/>
  <text x="560" y="568"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-weight="400" font-size="20"
        fill="#6a6a72">postrule.ai</text>
</svg>
