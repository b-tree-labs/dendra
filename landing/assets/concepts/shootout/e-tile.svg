<?xml version="1.0" encoding="UTF-8"?>
<!--
  E on a rounded graphite tile (iOS app-icon / Chrome-tab favicon
  convention). Structure cells become warm off-white against the
  graphite ground; b-cell stays accent.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#1a1a1f" rx="80"/>
  <rect x="80" y="80" width="160" height="160" fill="#f8f6f1"/>
  <rect x="272" y="80" width="160" height="160" fill="#BF5700"/>
  <rect x="80" y="272" width="160" height="160" fill="#f8f6f1"/>
  <rect x="272" y="272" width="160" height="160" fill="#f8f6f1"/>
</svg>
