<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2' on a rounded graphite tile. Floor and gate become warm
  off-white; accent stays orange. Recentered vertically so the
  composition fits the tile without crowding the top or bottom.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#1a1a1f" rx="80"/>

  <!-- Rule floor, parted for accent, shifted up by 16 to center -->
  <line x1="72" y1="384" x2="222" y2="384"
        stroke="#f8f6f1" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="384" x2="440" y2="384"
        stroke="#f8f6f1" stroke-width="34" stroke-linecap="square"/>

  <!-- Gate -->
  <polyline points="172,384 172,184 340,184 340,384"
            fill="none"
            stroke="#f8f6f1" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Accent -->
  <line x1="256" y1="432" x2="256" y2="80"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
