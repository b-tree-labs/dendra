<?xml version="1.0" encoding="UTF-8"?>
<!--
  A2-horiz — Dendrite · Symmetric · Horizontal

  A2 rotated 90° counterclockwise. Trunk runs left→center; Y-split
  at the centerline; branches extend up-right and down-right.
  Accent is the split node. Reads as "input enters, fork at the
  decision point, two outcome paths" — a data-flow shape rather
  than a tree-growing shape. Preserves left-right + up-down
  symmetry about the horizontal axis.

  Note: Critic 3 flagged vertical Dendrite as reading "tree /
  branching / neural net." Horizontal Dendrite reads "flow /
  decision / process fork" — which is semiotically closer to what
  Postrule actually does (wrap a classification decision, route its
  outputs through phases).
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Trunk, entering from the left -->
  <line x1="96" y1="256" x2="256" y2="256"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Upper branch -->
  <line x1="256" y1="256" x2="366" y2="146"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Lower branch -->
  <line x1="256" y1="256" x2="366" y2="366"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Accent split node — the decision point is the ember -->
  <circle cx="256" cy="256" r="32" fill="#BF5700"/>
</svg>
