<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2' · Wide

  Wider gate: posts move outward from x=172/340 to x=132/380.
  Gate interior is now 248 px wide vs D2's 168 px. Reads more
  like a passageway than a narrow portal; feels inviting rather
  than monolithic. The accent still centers at x=256 and the
  floor gap still matches the accent stroke-width (34 px).
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <line x1="72" y1="400" x2="222" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Wider gate -->
  <polyline points="132,400 132,200 380,200 380,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <line x1="256" y1="448" x2="256" y2="96"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
