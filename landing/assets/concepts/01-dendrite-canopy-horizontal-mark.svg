<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3-horiz — Dendrite · Canopy · Horizontal

  A3 rotated 90° counterclockwise. Compound-branching decision
  tree: one input (trunk on the left) forks through a split node,
  branches into two primary paths, then each primary forks into
  two more — four terminal tips all pointing rightward. Reads as
  "one decision, many possible outcomes paths" — a classification
  fanout.

  Conceptually this is the truest "decision tree" reading among
  the Dendrite variants, because horizontal-ness carries process
  time while verticality carries growth.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Trunk -->
  <line x1="80" y1="256" x2="216" y2="256"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Primary upper branch -->
  <line x1="216" y1="256" x2="296" y2="176"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Primary lower branch -->
  <line x1="216" y1="256" x2="296" y2="336"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Secondary branches off the upper primary -->
  <line x1="296" y1="176" x2="416" y2="112"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="296" y1="176" x2="416" y2="208"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Secondary branches off the lower primary -->
  <line x1="296" y1="336" x2="416" y2="304"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="296" y1="336" x2="416" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Accent at the split node — decision point -->
  <circle cx="216" cy="256" r="32" fill="#BF5700"/>
</svg>
