<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2' · Tall

  Addresses Critic 1's round-2 note: "pull the lintel up ~40 px so
  the gate has taller proportions — more torii, less TV-set."
  Lintel moves from y=200 to y=160; accent extends correspondingly
  from y=96 to y=64. Post width unchanged (168 px between posts,
  same as D2'). Reads as a narrower, more monumental gate.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor, parted exactly at accent-stroke width -->
  <line x1="72" y1="400" x2="222" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Taller gate — lintel at y=160 -->
  <polyline points="172,400 172,160 340,160 340,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Accent correspondingly longer -->
  <line x1="256" y1="448" x2="256" y2="64"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
