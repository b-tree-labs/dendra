<?xml version="1.0" encoding="UTF-8"?>
<!--
  C3 — Curve · Tick-marks

  Replaces the round checkpoint dots with short vertical tick marks
  crossing the curve. Reads more like a measurement ruler than a
  strung necklace. Last tick is the accent. Tighter, more
  disciplined execution — more "instrumentation" than "gems."
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="72" y1="416" x2="440" y2="416"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!-- Curve -->
  <path d="M 88 400 Q 256 400 424 128"
        fill="none"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!--
    Five tick marks crossing the curve at t ≈ 0.2, 0.4, 0.6, 0.8, 0.95.
    Each tick is a short perpendicular stroke centered on the curve
    point. Using horizontal line-slashes keeps the SVG cheap; true
    normals would require computed derivatives.
  -->
  <line x1="156" y1="362" x2="156" y2="422"
        stroke="#1a1a1f" stroke-width="20" stroke-linecap="square"/>
  <line x1="222" y1="326" x2="222" y2="386"
        stroke="#1a1a1f" stroke-width="20" stroke-linecap="square"/>
  <line x1="294" y1="270" x2="294" y2="330"
        stroke="#1a1a1f" stroke-width="20" stroke-linecap="square"/>
  <line x1="360" y1="200" x2="360" y2="260"
        stroke="#1a1a1f" stroke-width="20" stroke-linecap="square"/>
  <line x1="412" y1="112" x2="412" y2="172"
        stroke="#BF5700" stroke-width="20" stroke-linecap="square"/>
</svg>
