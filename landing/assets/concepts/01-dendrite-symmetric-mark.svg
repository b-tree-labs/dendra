<?xml version="1.0" encoding="UTF-8"?>
<!--
  A2 — Dendrite · Symmetric

  Same Y topology as A1, but the accent moves INTO the split node
  itself. The mark is now perfectly left-right symmetric — the
  graduation point IS the ember. No right-branch tip asymmetry.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <line x1="256" y1="416" x2="256" y2="256"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="256" y1="256" x2="146" y2="146"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="256" y1="256" x2="366" y2="146"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Accent node at the graduation point -->
  <circle cx="256" cy="256" r="32" fill="#BF5700"/>
</svg>
