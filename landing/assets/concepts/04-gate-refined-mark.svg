<?xml version="1.0" encoding="UTF-8"?>
<!--
  D1' — Gate · Refined

  Critic 2's three fixes applied:
  1. Accent tick shortened from ~104 px (y=200→96) to ~72 px
     (y=172→100) so it reads as "a short extension past the
     threshold" rather than a third post. Matches Axiom Labs origin
     accent proportions (origin accent ≈ 30 px on a ~310 px content
     width, same 10% ratio).
  2. Corner joints resolved by merging the two posts and the lintel
     into a single polyline with stroke-linejoin="miter", so the
     three strokes share one geometry instead of stacking three
     square-capped overlaps.
  3. 28 r graphite center node placed at the lintel's midpoint —
     the threshold-crossing point the accent emerges from. Docks
     Dendra into Axiom Labs' center-node vocabulary (origin mark
     uses the same 28 r node).
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="72" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Gate: posts + lintel as a single continuous path -->
  <polyline points="172,400 172,200 340,200 340,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Threshold-crossing node -->
  <circle cx="256" cy="200" r="28" fill="#1a1a1f"/>

  <!-- Accent tick — emerges from the node upward -->
  <line x1="256" y1="172" x2="256" y2="100"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
