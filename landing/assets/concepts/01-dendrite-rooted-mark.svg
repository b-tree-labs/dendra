<?xml version="1.0" encoding="UTF-8"?>
<!--
  A4 — Dendrite · Rooted

  The tree inverted: a straight upward trunk rising from a ROOT
  system at the base (the rule is the root, quite literally), with
  a terminal accent tick at the very top. No branching canopy —
  the graduation is the ascent itself. Reads as "planted, rising."
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Root splay at base — three short diagonals fanning into the ground -->
  <line x1="160" y1="440" x2="230" y2="380"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="256" y1="448" x2="256" y2="380"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="352" y1="440" x2="282" y2="380"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Trunk rises from the root meeting point upward -->
  <line x1="256" y1="380" x2="256" y2="128"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Root node where all three meet -->
  <circle cx="256" cy="380" r="28" fill="#1a1a1f"/>

  <!-- Accent tick at the terminal — graduation -->
  <line x1="256" y1="128" x2="256" y2="96"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
