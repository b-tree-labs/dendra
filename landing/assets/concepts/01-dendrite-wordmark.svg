<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept A — "Dendrite" wordmark (horizontal lockup).

  Follows the Axiom Labs horizontal-wordmark layout exactly:
  1200×300 canvas, mark scaled 0.391 to 200×200 square in the left
  gutter, "DENDRA" set in Space Grotesk Medium at 108 px with
  letter-spacing 19.4 (matching the Axiom Labs wordmark). For
  production export, outline the text (Inkscape: Path → Object to
  Path) so rendering-device font substitution can't drift the mark.
-->
<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#f8f6f1"/>

  <g transform="translate(50, 50) scale(0.391)">
    <line x1="256" y1="416" x2="256" y2="256"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <line x1="256" y1="256" x2="146" y2="146"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <line x1="256" y1="256" x2="366" y2="146"
          stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
    <circle cx="256" cy="256" r="28" fill="#1a1a1f"/>
    <line x1="366" y1="146" x2="396" y2="116"
          stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
  </g>

  <text x="300" y="185"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="500" font-size="108" letter-spacing="19.4"
        fill="#1a1a1f">DENDRA</text>
</svg>
