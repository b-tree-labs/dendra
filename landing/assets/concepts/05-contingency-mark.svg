<?xml version="1.0" encoding="UTF-8"?>
<!--
  E · Contingency

  A fifth direction, proposed by Critic 3 (semiotics). Dendra's
  mechanism is a paired-proportion test — a 2×2 table of
  {rule_correct, rule_wrong} × {ml_correct, ml_wrong}. Advancement
  hinges on a specific off-diagonal cell: the b-cell where ML was
  right and the rule was wrong.

          rule_correct   rule_wrong
    ml_   ┌─────────┐   ┌─────────┐
    corr  │  TL  a  │   │  TR  b  │ ← accent
          └─────────┘   └─────────┘

          ┌─────────┐   ┌─────────┐
    ml_   │  BL  c  │   │  BR  d  │
    wrong └─────────┘   └─────────┘

  Three cells graphite, one cell (top-right, the b-cell) accent.
  The mark's geometry IS the product's math.

  Semiotic argument (Critic 3): "The only logo in the category
  whose geometry is the product's actual math. It reads as a
  window, a pixel, a confusion matrix, a crosshair. Distinctly not
  a tree, a chart, or a neural net."

  Portfolio fit: pairs with B-Tree Labs' cross — both are
  orthogonal-axis marks with one accent off-center. Sibling
  grammar.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Top-left: rule_correct ∧ ml_correct (the "a" cell) -->
  <rect x="88" y="88" width="144" height="144" fill="#1a1a1f"/>

  <!-- Top-right: rule_wrong ∧ ml_correct (the "b" cell — accent) -->
  <rect x="280" y="88" width="144" height="144" fill="#BF5700"/>

  <!-- Bottom-left: rule_correct ∧ ml_wrong (the "c" cell) -->
  <rect x="88" y="280" width="144" height="144" fill="#1a1a1f"/>

  <!-- Bottom-right: rule_wrong ∧ ml_wrong (the "d" cell) -->
  <rect x="280" y="280" width="144" height="144" fill="#1a1a1f"/>
</svg>
