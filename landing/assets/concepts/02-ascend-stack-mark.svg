<?xml version="1.0" encoding="UTF-8"?>
<!--
  B3 — Ascend · Stack

  Six horizontal bars stacked vertically — same x-position, no
  rightward movement. Reads as "foundational strata" rather than a
  staircase. The rule floor (faint dust line) anchors the bottom;
  the topmost bar is the accent. Feels more architectural, less
  infographic.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor — wider than the stack for grounding -->
  <line x1="72" y1="432" x2="440" y2="432"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!-- Six stacked bars, centered, consistent width -->
  <line x1="136" y1="392" x2="376" y2="392"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="136" y1="344" x2="376" y2="344"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="136" y1="296" x2="376" y2="296"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="136" y1="248" x2="376" y2="248"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="136" y1="200" x2="376" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="136" y1="152" x2="376" y2="152"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
