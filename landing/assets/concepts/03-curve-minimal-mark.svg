<?xml version="1.0" encoding="UTF-8"?>
<!--
  C2 — Curve · Minimal

  Addresses the "strong concept, weak image" feedback by stripping
  the curve down to its essentials: one graphite arc, one accent
  dot at the peak, one dust-grey rule floor beneath. No intermediate
  checkpoint dots. The curve now reads as a single confident
  gesture instead of a constellation of measurements.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="72" y1="416" x2="440" y2="416"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!-- Single transition curve -->
  <path d="M 88 400 Q 256 400 424 128"
        fill="none"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Terminal accent — the one graduation worth marking -->
  <circle cx="408" cy="144" r="36" fill="#BF5700"/>
</svg>
