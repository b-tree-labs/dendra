<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept B — "Ascend"

  Direct innovation resonance. Six short horizontal segments ascending
  from baseline to summit — one segment per Postrule phase (RULE,
  LLM_SHADOW, LLM_PRIMARY, ML_SHADOW, ML_WITH_FALLBACK, ML_PRIMARY).
  The horizontal baseline is the rule floor (always present). The
  topmost step is the accent tick — the phase that required the most
  evidence to reach.

  Visual vocabulary: same 34-px stroke width, same palette. Distinct
  glyph (stepped) per brand portfolio rule.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor (baseline) — faint reference stroke -->
  <line x1="72" y1="432" x2="440" y2="432"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!-- Step 1 — RULE -->
  <line x1="72" y1="396" x2="132" y2="396"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <!-- Step 2 — LLM_SHADOW -->
  <line x1="132" y1="352" x2="192" y2="352"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <!-- Step 3 — LLM_PRIMARY -->
  <line x1="192" y1="308" x2="252" y2="308"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <!-- Step 4 — ML_SHADOW -->
  <line x1="252" y1="264" x2="312" y2="264"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <!-- Step 5 — ML_WITH_FALLBACK -->
  <line x1="312" y1="220" x2="372" y2="220"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <!-- Step 6 — ML_PRIMARY (accent) -->
  <line x1="372" y1="176" x2="440" y2="176"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
