<?xml version="1.0" encoding="UTF-8"?>
<!--
  C4 — Curve · Step-function

  A Curve / Ascend hybrid: the transition curve drawn as a stepped
  staircase of horizontal + vertical segments. Reads as "discrete
  phase advances along a rising path." Keeps the curve's research-
  figure origin while fixing the "too curvy / not crisp" feedback.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="72" y1="416" x2="440" y2="416"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!--
    Six step surfaces connected by vertical risers. Heights mirror
    the Ascend ratios but the rises get TALLER near the top, tracing
    the accelerating tail of the measured transition curve.
  -->
  <polyline
    points="88,400 152,400 152,376 216,376 216,336 280,336 280,280 344,280 344,200 400,200"
    fill="none"
    stroke="#1a1a1f" stroke-width="34"
    stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Terminal accent — the last step up -->
  <line x1="400" y1="200" x2="400" y2="128"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
