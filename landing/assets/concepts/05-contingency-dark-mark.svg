<?xml version="1.0" encoding="UTF-8"?>
<!--
  E · Contingency · Dark ground

  Full color inversion for dark contexts: graphite canvas, the
  three structure cells become warm off-white, and the b-cell stays
  accent orange. PMS 159 / #BF5700 holds on both light and dark
  grounds (contrast ~4.3:1 on off-white, ~3.2:1 on graphite — still
  WCAG-AA for non-text).

  The composition preserves the original argument: three cells vs.
  one, with the b-cell as the distinguished outcome. The accent
  doesn't have to carry maximum luminance contrast to be read —
  its job is to be the one cell that *is different from the other
  three*, and that argument holds regardless of ground.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#1a1a1f"/>

  <!-- Top-left: rule_correct ∧ ml_correct (the "a" cell) -->
  <rect x="88" y="88" width="144" height="144" fill="#f8f6f1"/>

  <!-- Top-right: rule_wrong ∧ ml_correct (the "b" cell — accent) -->
  <rect x="280" y="88" width="144" height="144" fill="#BF5700"/>

  <!-- Bottom-left: rule_correct ∧ ml_wrong (the "c" cell) -->
  <rect x="88" y="280" width="144" height="144" fill="#f8f6f1"/>

  <!-- Bottom-right: rule_wrong ∧ ml_wrong (the "d" cell) -->
  <rect x="280" y="280" width="144" height="144" fill="#f8f6f1"/>
</svg>
