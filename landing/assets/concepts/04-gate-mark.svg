<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept D — "Gate"

  Direct theorem resonance. A horizontal rule floor with two vertical
  gate posts rising from it, and an accent tick ascending past the
  gate's top — the shape of "evidence crosses the statistical
  threshold, advancement earned." Reads as a literal phase-gate: the
  rule is the ground the gate stands on; the accent is what passes
  through upward.

  Visual vocabulary: same 34-px stroke, same palette. Resembles a
  stylized gateway (Π) with an ember tick rising.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor (the ground the gate stands on) -->
  <line x1="72" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Left gate post -->
  <line x1="172" y1="400" x2="172" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Right gate post -->
  <line x1="340" y1="400" x2="340" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Gate lintel (the threshold itself) -->
  <line x1="172" y1="200" x2="340" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Accent tick: the "passage" rising through the gate -->
  <line x1="256" y1="200" x2="256" y2="96"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
