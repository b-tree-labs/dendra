<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept C — "Curve"

  Direct paper-artifact resonance. An ascending quadratic arc from
  baseline (rule accuracy) to summit (ML ceiling) — literally the
  transition curve Figure 1 shows. Five checkpoint dots sit along the
  curve marking phase transitions; the final dot is accent orange,
  representing the graduation that cleared its paired-proportion test.
  A faint horizontal rule-floor reference sits underneath.

  Visual vocabulary: same 34-px stroke, same palette. The curve uses
  a quadratic Bezier; the checkpoint dots are at evenly-spaced t
  values along the curve so the mark reads identically at any size.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor (baseline) — faint reference -->
  <line x1="72" y1="416" x2="440" y2="416"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!--
    Transition curve — quadratic Bezier from bottom-left to top-right.
    Control point placed above-and-right of start so the curve rises
    gently then steepens, matching the measured shape on ATIS /
    HWU64 / Banking77 / CLINC150.
  -->
  <path d="M 88 400 Q 256 400 424 128"
        fill="none"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!--
    Checkpoint dots — 5 phase-transition gates along the curve at
    t ≈ 0.15, 0.35, 0.55, 0.75, 0.95 of the Bezier parametrization.
    Bezier: B(t) = (1-t)² · P0 + 2(1-t)t · P1 + t² · P2
    P0=(88,400), P1=(256,400), P2=(424,128). y-values computed
    explicitly so future editors can verify positioning without
    re-solving the math.
  -->
  <circle cx="136" cy="394" r="20" fill="#1a1a1f"/>
  <circle cx="200" cy="367" r="20" fill="#1a1a1f"/>
  <circle cx="264" cy="318" r="20" fill="#1a1a1f"/>
  <circle cx="328" cy="247" r="20" fill="#1a1a1f"/>
  <circle cx="400" cy="150" r="28" fill="#BF5700"/>
</svg>
