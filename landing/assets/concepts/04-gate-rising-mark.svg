<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2 — Gate · Rising

  The accent tick now starts BELOW the rule-floor baseline and
  rises up THROUGH the floor and THROUGH the gate's center. Reads
  as "evidence accumulates from below, passes the rule floor, then
  crosses the phase gate" — a more dynamic and directional variant
  of D1.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor, parted at the accent so the tick can rise through -->
  <line x1="72" y1="400" x2="232" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="280" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Gate posts -->
  <line x1="172" y1="400" x2="172" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="340" y1="400" x2="340" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Lintel -->
  <line x1="172" y1="200" x2="340" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!--
    Rising tick — starts below the floor, crosses it, continues up
    past the lintel. The one accent runs the whole vertical.
  -->
  <line x1="256" y1="448" x2="256" y2="96"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
