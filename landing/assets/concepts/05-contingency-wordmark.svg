<?xml version="1.0" encoding="UTF-8"?>
<!--
  E · Contingency horizontal wordmark (mark + "DENDRA").
  Same layout as Axiom Labs wordmark system: 1200×300 canvas, mark
  scaled 0.391 into the left gutter, wordmark set in Space Grotesk
  Medium 108 px with 0.18em tracking.
-->
<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#f8f6f1"/>

  <g transform="translate(50, 50) scale(0.391)">
    <rect x="88" y="88" width="144" height="144" fill="#1a1a1f"/>
    <rect x="280" y="88" width="144" height="144" fill="#BF5700"/>
    <rect x="88" y="280" width="144" height="144" fill="#1a1a1f"/>
    <rect x="280" y="280" width="144" height="144" fill="#1a1a1f"/>
  </g>

  <text x="300" y="185"
        font-family="'Space Grotesk', 'Neue Haas Grotesk Display', 'Helvetica Neue', system-ui, sans-serif"
        font-weight="500" font-size="108" letter-spacing="19.4"
        fill="#1a1a1f">DENDRA</text>
</svg>
