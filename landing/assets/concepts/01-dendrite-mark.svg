<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept A — "Dendrite"

  Direct name resonance. "Postrule" comes from Greek δένδρον (tree), and
  the mark is a stylized upward-branching tree. Two levels of branching
  from a single trunk node: one rule (trunk) rising to a split, then
  graduating outward into the two modalities the paper names
  (LLM-tier, ML-tier). One terminal branch is tipped with the accent
  tick — the graduation that has been "earned."

  Visual vocabulary: shared with B-Tree Labs origin mark — same 34-px
  square-capped strokes at 512 viewBox, same palette, same 28r center
  node. Distinct glyph (branching, not crossing) per brand/usage.md
  portfolio rule.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Trunk: rises from the baseline to the split node -->
  <line x1="256" y1="416" x2="256" y2="256"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Left branch -->
  <line x1="256" y1="256" x2="146" y2="146"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Right branch -->
  <line x1="256" y1="256" x2="366" y2="146"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Split node (graduation point) -->
  <circle cx="256" cy="256" r="28" fill="#1a1a1f"/>

  <!-- Accent tick: the "earned graduation" on the right branch tip -->
  <line x1="366" y1="146" x2="396" y2="116"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
