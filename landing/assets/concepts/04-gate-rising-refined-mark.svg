<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2' — Gate · Rising · Refined

  Critic 2's concern on D2 was that the parted floor (original gap
  48 px) is wider than the accent stroke (34 px), which makes the
  accent read as "walking through a doorway" rather than piercing.
  Fix: narrow the floor gap to exactly one stroke-width (34 px), so
  the accent stroke fills the gap flush. The floor is now
  mechanically and visually "crossed at a measured point," which is
  what Critic 3 identified as this mark's semiotic argument:

      "The rule-floor is parted BY the accent — the geometry
       asserts that the floor is not broken but crossed at a
       measured point, which is exactly what a McNemar rejection
       does to the null."

  With the gap matched to the stroke, the argument holds and the
  craft works.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor, parted exactly at accent-stroke width -->
  <line x1="72" y1="400" x2="222" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Gate posts + lintel as one continuous path -->
  <polyline points="172,400 172,200 340,200 340,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!--
    Accent crosses the floor and the gate cleanly.
    Floor gap x=[239,273] exactly matches the accent stroke at x=256.
  -->
  <line x1="256" y1="448" x2="256" y2="96"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
