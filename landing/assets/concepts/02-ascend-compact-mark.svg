<?xml version="1.0" encoding="UTF-8"?>
<!--
  B2 — Ascend · Compact

  Six steps rendered with tighter density — each step 48 px wide,
  stepping 36 px right and 36 px up. Fills the central region more
  fully than B1 so the mark reads as a single dense-rhythm object
  rather than a sparse staircase. Floor line extended to the full
  width for grounding.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="64" y1="424" x2="448" y2="424"
        stroke="#d8d3c9" stroke-width="34" stroke-linecap="square"/>

  <!-- Six steps, tighter rhythm -->
  <line x1="112" y1="384" x2="160" y2="384"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="160" y1="344" x2="208" y2="344"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="208" y1="304" x2="256" y2="304"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="256" y1="264" x2="304" y2="264"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="304" y1="224" x2="352" y2="224"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="352" y1="184" x2="400" y2="184"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
