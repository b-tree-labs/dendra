<?xml version="1.0" encoding="UTF-8"?>
<!--
  A3 — Dendrite · Canopy

  Breaks the Y-shape by adding a second level of branching: the two
  primary branches each fork again, giving four terminal tips.
  Reads less like a letter-Y and more like a stylized tree. Center
  node carries the accent; all strokes stay graphite.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Trunk -->
  <line x1="256" y1="432" x2="256" y2="296"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Primary branches (angle 35° from trunk) -->
  <line x1="256" y1="296" x2="162" y2="232"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="256" y1="296" x2="350" y2="232"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Secondary branches — left primary forks into two -->
  <line x1="162" y1="232" x2="96" y2="144"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="162" y1="232" x2="198" y2="118"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Secondary branches — right primary forks into two -->
  <line x1="350" y1="232" x2="314" y2="118"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="350" y1="232" x2="416" y2="144"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Graduation-point node carries the ember -->
  <circle cx="256" cy="296" r="32" fill="#BF5700"/>
</svg>
