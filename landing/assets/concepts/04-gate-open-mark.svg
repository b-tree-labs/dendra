<?xml version="1.0" encoding="UTF-8"?>
<!--
  D3 — Gate · Open

  Minimalist variant: drop the lintel, keep two gate posts standing
  on the rule floor with the accent tick rising between them.
  Reads as an open threshold — less architectural, more gesture.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <!-- Rule floor -->
  <line x1="72" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Left post -->
  <line x1="172" y1="400" x2="172" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Right post -->
  <line x1="340" y1="400" x2="340" y2="200"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <!-- Accent tick rising between the posts -->
  <line x1="256" y1="368" x2="256" y2="128"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
