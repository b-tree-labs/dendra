<?xml version="1.0" encoding="UTF-8"?>
<!--
  D2' · Restrained

  Accent now stops at the lintel (y=200) instead of extending
  above it. The composition stays within the gate's silhouette
  and reads as "evidence has reached the threshold" rather than
  "evidence has passed completely through." A more restrained,
  present-tense claim — the theorem has rejected the null but the
  phase transition is the next step, not a fait accompli.

  Note: this makes the mark more contained — the entire
  composition fits within an implicit bounding rectangle from the
  floor to the lintel, which may read more "logo-ish" in certain
  contexts (favicon, avatar) at the cost of some drama.
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#f8f6f1"/>

  <line x1="72" y1="400" x2="222" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>
  <line x1="290" y1="400" x2="440" y2="400"
        stroke="#1a1a1f" stroke-width="34" stroke-linecap="square"/>

  <polyline points="172,400 172,200 340,200 340,400"
            fill="none"
            stroke="#1a1a1f" stroke-width="34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Accent stops at the lintel — no extension above -->
  <line x1="256" y1="448" x2="256" y2="200"
        stroke="#BF5700" stroke-width="34" stroke-linecap="square"/>
</svg>
