# Dendra pre-commit hooks
#
# Install once:
#   pip install pre-commit
#   pre-commit install
#
# Runs automatically on `git commit`; manually with:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
              docs/papers/.*/results/.*\.jsonl|
              tests/test_security_benchmarks\.py|
              tests/redteam/test_auth_abuse\.py
          )$

  - repo: local
    hooks:
      - id: no-utexas
        name: fail on stray UT email/identifier references
        entry: >
          bash -c 'if grep -rEn "utexas|UT Austin|bbooth@" src/ tests/ docs/ README.md CHANGELOG.md SECURITY.md CONTRIBUTING.md 2>/dev/null; then echo "found UT references — expected to be scrubbed"; exit 1; fi'
        language: system
        pass_filenames: false
